<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Available Reports</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <h2>Available Reports</h2>

  <form id="searchForm" method="GET" action="{{ url_for('reports') }}">
    <div class="search-wrapper">
      <input type="text" name="q" id="search-input" placeholder="Search report name..." value="{{ query }}" autocomplete="off">
      <ul id="suggestions" class="autocomplete-list"></ul>
      <div style="margin-top: 10px; display: flex; gap: 10px;">
        <button type="submit" class="download-btn"><i class="fas fa-search icon"></i> Search</button>
        <button type="button" id="clear-btn" class="clear-btn">✖ Clear</button>
      </div>
    </div>
  </form>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Report Name</th>
          <th>Date & Time</th>
          <th>Download</th>
        </tr>
      </thead>
      <tbody>
        {% if files %}
          {% for file in files %}
          <tr>
            <td>{{ file.name }}</td>
            <td>{{ file.time }}</td>
            <td>
              <a href="{{ url_for('download', filename=file.name) }}" class="download-btn" title="Download">
                <i class="fas fa-download icon"></i> 📥
              </a>
            </td>
          </tr>
          {% endfor %}
        {% else %}
          <tr>
            <td colspan="3" style="color: #ff6b6b; padding: 20px; font-weight: bold;">
              ⚠️ No reports found matching your search.
            </td>
          </tr>
        {% endif %}
      </tbody>
    </table>

  </div>
  <div class="back-button">
    <a href="{{ url_for('dashboard') }}" class="action-button">
      ⬅️ Back to Dashboard
    </a>
  </div>


  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const input = document.getElementById("search-input");
      const form = document.getElementById("searchForm");
      const suggestionBox = document.getElementById("suggestions");
      const clearBtn = document.getElementById("clear-btn");

      let suggestions = [];
      let selectedIndex = -1;

      input.addEventListener("input", function () {
        const query = input.value.trim();
        if (!query) {
          suggestions = [];
          suggestionBox.innerHTML = "";
          return;
        }

        fetch(`/suggest?q=${encodeURIComponent(query)}`)
          .then(res => res.json())
          .then(data => {
            suggestions = data;
            selectedIndex = -1;
            renderSuggestions();
          });
      });

      function renderSuggestions() {
        suggestionBox.innerHTML = "";
        suggestions.forEach((item, index) => {
          const li = document.createElement("li");
          li.textContent = item;
          li.className = "autocomplete-item";
          if (index === selectedIndex) {
            li.classList.add("highlight");
          }
          li.addEventListener("mousedown", () => {
            input.value = item;
            suggestionBox.innerHTML = "";
            form.submit();
          });
          suggestionBox.appendChild(li);
        });
      }

      input.addEventListener("keydown", function (e) {
        if (suggestions.length === 0) return;

        if (e.key === "ArrowDown") {
          e.preventDefault();
          selectedIndex = (selectedIndex + 1) % suggestions.length;
          renderSuggestions();
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          selectedIndex = (selectedIndex - 1 + suggestions.length) % suggestions.length;
          renderSuggestions();
        } else if (e.key === "Enter") {
          if (selectedIndex >= 0 && selectedIndex < suggestions.length) {
            e.preventDefault();
            input.value = suggestions[selectedIndex];
            suggestionBox.innerHTML = "";
            form.submit();
          }
        }
      });

      clearBtn.addEventListener("click", () => {
        input.value = "";
        suggestionBox.innerHTML = "";
        input.focus();
      });

      input.addEventListener("blur", () => {
        setTimeout(() => suggestionBox.innerHTML = "", 100);
      });
    });
  </script>
</body>
</html>
